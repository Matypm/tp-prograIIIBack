<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <!-- Preset CSS -->
    <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura-vader.css" type="text/css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/pumpernic-cuadrado.png" alt="logo pumpernic">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="form-productos">
            <h2>Crear producto</h2>
            
            <form id="postProduct-form" class="form-alta">
                <label for="nameProd">Nombre</label>
                <input type="text" name="name" id="nameProd" required>

                <label for="imageProd">Imagen</label>
                <input type="text" name="image" id="imageProd" required>

                <label for="categoryProd">Categoria</label>
                <select name="category" id="categoryProd" required>
                    <option value="food">comida</option>
                    <option value="drink">bebida</option>
                </select>

                <label for="priceProd">Precio</label>
                <input type="number" name="price" id="priceProd" required>
                
                <div>
                    <input type="submit" value="Crear producto">
                </div>
            </form>

        </section>

        <section class="secccion-productos">
            <div id="contenedor-productos">

            </div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById("contenedor-productos");
        const postProductForm = document.getElementById("postProduct-form");
        const urlBase = "http://localhost:3000/api/productos";



        // Optimizacion 1: Validacion previa de los datos en el cliente

        function validarFormulario(data){
            const errores = [];

            if (!data.nombre || data.nombre.trim().lenght < 2){
                errores.push("El nombre debe tener al menos dos caracteres");
            };

            if (!data.talle){
                errores.push("Debe seleccionar un talle");
            };

            if (!data.precio || isNaN(data.precio) || Number(data.precio) < 0){
                errores.push("El precio debe ser mayor a 0");
            };

            if (!data.temporada){
                errores.push(`Debe seleccionar una temporada (formato: "25-26")`);
            };

            if (!data.img){
                errores.push("Debe incluir una imagen");
            };

            return errores;
        };

        // Optimizacion 2: Mostramos el mensaje de exito o error visualmente
        function mostrarMensaje(type, message){
            contenedorProductos.innerHTML = `
                <p class="mensaje mensaje-${type}">${message}</p>
            `;
        };

        function mostrarListaErrores(array){
            let htmlErrores = "";
            array.forEach(error => {
                htmlErrores += `<p class="mensaje mensaje-error">${error}</p>`;
            });
            contenedorProductos.innerHTML += htmlErrores;
        };

        // Gestionamos el envio de datos del formlario
        postProductForm.addEventListener("submit", async event => {
            event.preventDefault();

            const formData = new FormData(event.target);

            const data = Object.fromEntries(formData.entries());

            // Optimizacion 3: parseamos price antes de enviarlo, porque FormData devuelve todo como strings
            data.precio = Number(data.precio);

            console.log(data); // {name: 'Muzza', image: 'https://.jpg', category: 'food', price: '123'}

            // Optimizacion 4: Llamamos a la funcion para validar los datos del formulario
            const errores = validarFormulario(data);

            if (errores > 0){
                console.log(errores); 
                mostrarListaErrores(errores);
                return;
            };

            


            try {
                const response = await fetch(urlBase, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                console.log(response); // Response {type: 'cors', url: 'http://localhost:3000/api/products', redirected: false, status: 200, ok: true, …}

                // Aca transformare la respuesta JSON que devuelve el endpoint: message: "Producto creado con exito"
                const result = await response.json(); // Aca obtenemos la respuesta parseada que me devuelve el servidor

                // Optimizacion 5: Manejamos respuestas no ok del servidor
                if (!response.ok){

                    if (result.listaErrores){
                        mostrarListaErrores(result.listaErrores)
                    }

                    mostrarMensaje("error", result.message);
                    return;
                }

                // En caso de exito, mostramos los siguientes mensajes
                mostrarMensaje("exito", result.message)
                console.log(result.message);

            } catch (error) {
                console.error("Error al enviar los datos ", error);
                mostrarMensaje("error", "Error al procesar la solicitud");
            }
        })
    </script>
    
</body>
</html>
