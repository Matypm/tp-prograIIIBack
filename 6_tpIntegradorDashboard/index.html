<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <!-- Preset CSS -->
    <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura-vader.css" type="text/css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/pumpernic-cuadrado.png" alt="logo pumpernic">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="secccion-productos">
            <h2>Nuestros productos</h2>
            <div id="contenedor-productos">
                <!-- 
                <div class="card-producto">
                    <img src="assets/img/pumpernic-cuadrado.png" alt="">
                    <h4>hamburguesa</h4>
                    <p>Id: 1</p>
                    <p>$3000</p>
                </div>
                -->
            </div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById("contenedor-productos");

        const urlBase = "http://localhost:3000/api/productos/";


        // Optimizacion 1: Mostramos el msj de error visualmente para el usuario
        function mostrarError(message){
            contenedorProductos.innerHTML = `
                <p class="mensaje mensaje-error">${message}</p>
            `;
        };

        async function obtenerProductos() {
            try {

                // Gracias a la API fetch, realizo una peticion HTTP GET a mi propia api rest, al endpoint GET /api/products
                const response = await fetch(urlBase);

                console.log(response);

                // Una vez que recibo todo el choclo JSON, lo parseo con response.json()
                const data = await response.json();

                //los codigos 200 llevan un booleano ok:true (200 OK)
                 if (!response.ok) {
                    mostrarError(data.message);
                    return;
                }
                
                // Extraigo los productos que vienen en la clave payload
                const productos = data.payload;
                console.log(productos);
                
                renderizarProductos(productos);

            } catch (error) {
                console.error(error);
                mostrarError("Error de conexion con el servidor");
            }

        }

        function renderizarProductos(array) {
            let htmlProductos = "";

            array.forEach(producto => {
                htmlProductos += `
                    <div class="card-producto">
                        <img src="${producto.image}" alt="${producto.name}">
                        <h4>${producto.name}</h4>
                        <p>Id: ${producto.id}</p>
                        <p>$${producto.price}</p>
                    </div>
                `;
            });

            contenedorProductos.innerHTML = htmlProductos;
        }

        obtenerProductos();


    </script>
    
</body>
</html>
